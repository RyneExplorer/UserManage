<!DOCTYPE html>
<html lang="zh-CN">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>编辑用户</title>
 <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
 <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
  <div class="flex items-center justify-between mb-6">
   <h1 class="text-2xl font-bold text-gray-800">编辑用户</h1>
   <a href="/users" class="text-sm text-blue-600 hover:text-blue-500">返回列表</a>
  </div>

  {{if .Error}}
  <div class="mb-4 rounded-md bg-red-50 px-4 py-2 text-sm text-red-700">{{.Error}}</div>
  {{end}}

  <form action="/users/edit" method="post" class="space-y-4">
   <input type="hidden" name="id" value="{{.User.ID}}">

   <div>
    <label for="username" class="block text-sm font-medium text-gray-700">用户名</label>
    <input type="text" id="username" name="username" value="{{.User.Username}}"
     class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
     required />
   </div>

   <div>
    <label for="role" class="block text-sm font-medium text-gray-700">角色</label>
    <select id="role" name="role"
     class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
     <option value="user" {{if eq .User.Role "user"}}selected{{end}}>普通用户</option>
     <option value="admin" {{if eq .User.Role "admin"}}selected{{end}}>管理员</option>
    </select>
   </div>

   <div>
    <label for="status" class="block text-sm font-medium text-gray-700">状态</label>
    <select id="status" name="status"
     class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
     <option value="1" {{if .User.Status}}selected{{end}}>启用</option>
     <option value="0" {{if .User.Status}}{{else}}selected{{end}}>禁用</option>
    </select>
   </div>

   <button type="submit"
    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
    保存
   </button>
  </form>
 </div>
</body>

</html>
